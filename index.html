<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>구구단 갤러그 마스터 v2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #000;
            --primary-color: #00ffff;
            --accent-color: #ff003c;
            --key-bg: #333;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 메인 컨테이너: 1인용일 때도 화면 중앙에 위치하도록 수정 */
        #game-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            max-width: 1600px;
            background: #050505;
            justify-content: center; /* 추가: 레인이 1개일 때 가운데 정렬 */
        }

        /* 플레이어별 레인 */
        .player-lane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            border-left: 1px solid #222; /* 1인용일 때 좌우 경계선이 보이도록 */
            position: relative;
            max-width: 500px;
            height: 100%;
        }

        .player-lane:last-child { border-right: none; }
        .player-lane:first-child { border-left: none; } /* 다인용일 때 첫번째 왼쪽 선 제거 */

        /* 상단 게임 화면 */
        .game-screen {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #000 0%, #0a0a1a 100%);
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            z-index: 20;
            pointer-events: none;
        }

        .lives-container {
            display: flex;
            gap: 5px;
            color: var(--accent-color);
        }

        /* 적군 우주선 */
        .enemy {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateX(-50%);
            z-index: 10;
        }

        .enemy-ship {
            font-size: 24px;
            color: var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color);
        }

        .enemy-problem {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #ffcc00;
            font-family: inherit;
            white-space: nowrap; /* 글자 줄바꿈 방지 */
            background: rgba(0,0,0,0.5); /* 가독성 향상 */
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* 플레이어 우주선 */
        .player-ship {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            transition: transform 0.1s;
        }

        /* 미사일 효과 */
        .laser {
            position: absolute;
            width: 2px;
            height: 15px;
            background-color: var(--accent-color);
            box-shadow: 0 0 5px var(--accent-color);
            transition: all 0.15s linear;
            z-index: 10;
        }

        /* 하단 컨트롤러 */
        .controller {
            height: 240px;
            background: #111;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 2px solid #333;
        }

        .display-area {
            height: 40px;
            background: #000;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #0f0;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            flex: 1;
        }

        .key {
            background: var(--key-bg);
            border: none;
            color: white;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            box-shadow: 0 3px #000;
        }

        .key:active { transform: translateY(2px); box-shadow: 0 1px #000; }
        .key.clr { background: #600; }
        .key.fire { background: #0066cc; }

        /* 오버레이 효과 */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .countdown { font-size: 60px; color: yellow; }
        
        /* 시작 셋업 화면 개선 */
        .setup-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-title {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.5;
            font-size: 32px;
        }

        .setup-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 320px; /* 버튼들이 예쁘게 2줄로 정렬되도록 제어 */
        }

        .setup-btn {
            width: 140px; /* 고정 너비로 그리드 느낌 부여 */
            padding: 20px 0;
            background: var(--accent-color);
            color: white;
            border: none;
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px #990024;
        }
        
        .setup-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 #990024;
        }

        /* 레벨업 및 폭발 효과 */
        .level-up-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: yellow;
            font-size: 24px;
            text-shadow: 2px 2px 0 #ff003c;
            animation: bounceFade 1.5s forwards;
            z-index: 50;
        }

        @keyframes bounceFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .explosion {
            position: absolute;
            font-size: 30px;
            transform: translateX(-50%);
            z-index: 15;
            animation: explodeFade 0.2s forwards;
        }

        @keyframes explodeFade {
            0% { transform: translateX(-50%) scale(0); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1 class="setup-title">GALAGA<br>MULTIPLIER</h1>
        <p style="margin-bottom: 20px;">인원수를 선택하세요</p>
        <div class="setup-buttons">
            <button class="setup-btn" onclick="initGame(1)">1인용</button>
            <button class="setup-btn" onclick="initGame(2)">2인용</button>
            <button class="setup-btn" onclick="initGame(3)">3인용</button>
            <button class="setup-btn" onclick="initGame(4)">4인용</button>
        </div>
    </div>

    <div id="game-wrapper"></div>

<script>
    const wrapper = document.getElementById('game-wrapper');
    const setup = document.getElementById('setup');
    
    let players = [];
    const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (AUDIO_CTX.state === 'suspended') return;
        
        const osc = AUDIO_CTX.createOscillator();
        const gain = AUDIO_CTX.createGain();
        osc.connect(gain);
        gain.connect(AUDIO_CTX.destination);

        if (type === 'correct') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, AUDIO_CTX.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, AUDIO_CTX.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, AUDIO_CTX.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AUDIO_CTX.currentTime + 0.2);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, AUDIO_CTX.currentTime);
            osc.frequency.linearRampToValueAtTime(50, AUDIO_CTX.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, AUDIO_CTX.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, AUDIO_CTX.currentTime + 0.3);
        } else if (type === 'level') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, AUDIO_CTX.currentTime);
            osc.frequency.setValueAtTime(659.25, AUDIO_CTX.currentTime + 0.1);
            osc.frequency.setValueAtTime(783.99, AUDIO_CTX.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, AUDIO_CTX.currentTime);
            gain.gain.linearRampToValueAtTime(0, AUDIO_CTX.currentTime + 0.5);
        }

        osc.start();
        osc.stop(AUDIO_CTX.currentTime + 0.5);
    }

    class Player {
        constructor(id, parent) {
            this.id = id;
            this.score = 0;
            this.level = 1;
            this.lives = 3;
            this.currentInput = "";
            this.enemies = [];
            this.isPlaying = false;
            this.speed = 0.5; // 초기 속도 약간 낮춤
            
            this.createDOM(parent);
        }

        createDOM(parent) {
            this.lane = document.createElement('div');
            this.lane.className = 'player-lane';
            this.lane.innerHTML = `
                <div class="game-screen" id="screen-${this.id}">
                    <div class="hud">
                        <div>P${this.id+1} SCORE:<span id="score-${this.id}">${this.score}</span></div>
                        <div class="lives-container" id="lives-${this.id}">🚀🚀🚀</div>
                    </div>
                    <div class="player-ship" id="ship-${this.id}">🚀</div>
                </div>
                <div class="controller">
                    <div class="display-area" id="disp-${this.id}"></div>
                    <div class="keypad">
                        ${[7,8,9,4,5,6,1,2,3].map(n => `<button class="key" onclick="players[${this.id}].input(${n})">${n}</button>`).join('')}
                        <button class="key clr" onclick="players[${this.id}].clear()">C</button>
                        <button class="key" onclick="players[${this.id}].input(0)">0</button>
                        <button class="key fire" onclick="players[${this.id}].shoot()">FIRE</button>
                    </div>
                </div>
                <div class="overlay" id="overlay-${this.id}">
                    <div class="countdown" id="count-${this.id}">READY</div>
                </div>
            `;
            parent.appendChild(this.lane);
            
            this.screen = document.getElementById(`screen-${this.id}`);
            this.display = document.getElementById(`disp-${this.id}`);
            this.overlay = document.getElementById(`overlay-${this.id}`);
            this.countText = document.getElementById(`count-${this.id}`);
            this.ship = document.getElementById(`ship-${this.id}`);
            this.scoreEl = document.getElementById(`score-${this.id}`);
        }

        async start() {
            for(let i=3; i>0; i--) {
                this.countText.innerText = i;
                await new Promise(r => setTimeout(r, 800));
            }
            this.countText.innerText = "START!";
            await new Promise(r => setTimeout(r, 500));
            this.overlay.style.display = 'none';
            this.isPlaying = true;

            // 초기 겹침 방지: 1.5초 간격으로 순차 스폰
            const initialProblems = [
                {n1: 2, n2: 5}, {n1: 2, n2: 3}, {n1: 4, n2: 6}, {n1: 8, n2: 4}
            ];
            initialProblems.forEach((p, index) => {
                setTimeout(() => {
                    if(this.isPlaying) this.spawnEnemy(p.n1, p.n2);
                }, index * 1500);
            });
            
            // 일반 루프는 초기 문제들이 어느정도 나온 후 시작
            setTimeout(() => this.spawnLoop(), 6000); 
            this.update();
        }

        input(num) {
            if(!this.isPlaying) return;
            if(this.currentInput.length < 3) {
                this.currentInput += num;
                this.display.innerText = this.currentInput;
            }
        }

        clear() {
            this.currentInput = "";
            this.display.innerText = "";
        }

        spawnLoop() {
            if(!this.isPlaying) return;
            this.spawnEnemy();
            // 레벨이 오를수록 스폰 주기가 눈에 띄게 짧아짐 (최소 800ms)
            const delay = Math.max(800, 3000 - (this.level * 400));
            setTimeout(() => this.spawnLoop(), delay);
        }

        spawnEnemy(n1, n2) {
            if(!n1) n1 = Math.floor(Math.random() * 8) + 2;
            if(!n2) n2 = Math.floor(Math.random() * 9) + 1;
            
            const enemy = {
                ans: n1 * n2,
                y: -40,
                x: 15 + Math.random() * 70, // 화면 밖으로 나가지 않게 x범위 축소 (15% ~ 85%)
                el: document.createElement('div')
            };
            enemy.el.className = 'enemy';
            enemy.el.style.left = `${enemy.x}%`;
            
            // 외계 우주선 이모지로 통일 (레벨별로 변경)
            const alienEmojis = ['👾', '👽', '🛸', '🤖', '👿'];
            const emojiIndex = Math.min(this.level - 1, alienEmojis.length - 1);
            const enemyEmoji = alienEmojis[emojiIndex];
            
            enemy.el.innerHTML = `<div class="enemy-ship">${enemyEmoji}</div><div class="enemy-problem">${n1}x${n2}</div>`;
            
            this.screen.appendChild(enemy.el);
            this.enemies.push(enemy);
        }

        shoot() {
            if(!this.isPlaying || !this.currentInput) return;
            const val = parseInt(this.currentInput);
            let hitTarget = null;

            // 가장 아래에 있는 적부터 타격하도록 뒤에서부터 검색
            for(let i = 0; i < this.enemies.length; i++) {
                if(this.enemies[i].ans === val) {
                    hitTarget = this.enemies[i];
                    this.enemies.splice(i, 1);
                    break; 
                }
            }

            if(hitTarget) {
                playSound('correct');
                this.score += 100;
                this.scoreEl.innerText = this.score;
                this.createLaser(hitTarget);
                this.checkLevelUp();
            } else {
                playSound('wrong');
                this.reduceLife();
            }
            this.clear();
        }

        createLaser(target) {
            const laser = document.createElement('div');
            laser.className = 'laser';
            this.screen.appendChild(laser);

            const targetY = target.y + 10; 
            const startX = this.screen.clientWidth / 2;
            const startY = this.screen.clientHeight - 60;

            laser.style.top = startY + 'px';
            laser.style.left = startX + 'px';

            setTimeout(() => {
                laser.style.top = targetY + 'px';
                laser.style.left = target.el.offsetLeft + 'px';
            }, 10);

            setTimeout(() => {
                laser.remove();
                this.triggerExplosion(target);
            }, 150);
        }

        triggerExplosion(target) {
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.innerText = '💥';
            explosion.style.top = target.y + 'px';
            explosion.style.left = target.el.offsetLeft + 'px';
            this.screen.appendChild(explosion);
            
            target.el.remove();

            setTimeout(() => explosion.remove(), 200);
        }

        reduceLife() {
            this.lives--;
            document.getElementById(`lives-${this.id}`).innerText = "🚀".repeat(Math.max(0, this.lives));
            
            this.ship.style.transform = "translateX(-50%) scale(1.5)";
            this.ship.style.filter = "brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5)"; // 피격 시 빨갛게
            
            setTimeout(() => {
                this.ship.style.transform = "translateX(-50%) scale(1)";
                this.ship.style.filter = "none";
            }, 200);

            if(this.lives <= 0) this.gameOver();
        }

        checkLevelUp() {
            const newLevel = Math.floor(this.score / 500) + 1;
            if(newLevel > this.level) {
                this.level = newLevel;
                // 속도 증가폭을 키워 체감되게 함
                this.speed += 0.35; 
                playSound('level');
                
                const msg = document.createElement('div');
                msg.className = 'level-up-msg';
                msg.innerText = `LEVEL ${this.level} UP!`;
                this.screen.appendChild(msg);
                
                setTimeout(() => msg.remove(), 1500);
            }
        }

        update() {
            if(!this.isPlaying) return;
            const h = this.screen.clientHeight;

            for(let i=this.enemies.length-1; i>=0; i--) {
                const e = this.enemies[i];
                e.y += this.speed;
                e.el.style.top = e.y + 'px';

                // 적이 플레이어 라인에 닿으면
                if(e.y > h - 60) {
                    this.reduceLife(); 
                    e.el.remove();
                    this.enemies.splice(i, 1);
                }
            }
            requestAnimationFrame(() => this.update());
        }

        gameOver() {
            this.isPlaying = false;
            this.overlay.style.display = 'flex';
            this.overlay.innerHTML = `
                <h1 style="color:var(--accent-color); margin-bottom:10px;">GAME OVER</h1>
                <p style="font-size:18px; margin-bottom:30px;">SCORE: ${this.score}</p>
                <button class="setup-btn" onclick="location.reload()">다시 시작</button>
            `;
        }
    }

    function initGame(count) {
        setup.style.display = 'none';
        
        // 1인용일 경우 좌우 경계선이 안보일 수 있도록 wrapper 스타일 조정
        if(count === 1) {
            wrapper.style.borderLeft = '1px solid #222';
            wrapper.style.borderRight = '1px solid #222';
            wrapper.style.maxWidth = '500px';
        }

        for(let i=0; i<count; i++) {
            const p = new Player(i, wrapper);
            players.push(p);
            p.start();
        }
        
        if (AUDIO_CTX.state === 'suspended') {
            AUDIO_CTX.resume();
        }
    }
</script>
</body>
</html>
